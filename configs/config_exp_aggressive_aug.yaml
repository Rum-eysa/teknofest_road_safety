meta:
  model_id: "model_a"
  description: "Model A - agresif augmentation"

dataset:
  path: "/data/arac_bilgisi"
  train_split: 0.70
  val_split: 0.20
  test_split: 0.10
  classes:
    - "hatchback"
    - "pickup"
    - "sedan"
    - "suv"
    - "minibus"
    - "panelvan"
    - "kamyon"
    - "plaka"
  augmentation:
    hsv_augment:
      h_gain: 0.03
      s_gain: 0.9
      v_gain: 0.6
    geometric:
      degrees: 20
      translate: 0.15
      scale: [0.4, 1.6]
      perspective: 0.001
      flipud: 0.5
      fliplr: 0.5
    mosaic:
      enabled: true
      prob: 1.0
    mixup:
      enabled: true
      prob: 0.5
      alpha: 8.0

model:
  architecture: "yolov8m"
  pretrained: true
  backbone: "coco"
  task: "detect"
  single_cls: false

training:
  epochs: 100
  patience: 15
  batch_size: 32
  gradient_accumulation: 1
  imgsz: 640
  optimizer: "SGD"
  lr0: 0.01
  lrf: 0.01
  momentum: 0.937
  weight_decay: 0.0005
  scheduler: "linear"
  warmup_epochs: 3.0
  warmup_momentum: 0.8
  cls_pw: 1.0
  obj_pw: 1.0
  iou_pw: 2.0

inference:
  save_period: 5
  val_period: 1
  nms_conf_threshold: 0.25
  nms_iou_threshold: 0.45
  max_det: 10

hardware:
  device: "0"
  amp: true
  cache_images: false
  workers: 4
  pin_memory: true
  max_training_time_seconds: 18000

output:
  project: "/output"
  name: "experiment_aggressive_aug"
  save_best: true
  save_last: true
  log_freq: 50
  verbose: true

debug:
  visualize_training: true
  save_predictions: false
  test_on_validation: true
  confidence_threshold: 0.5
