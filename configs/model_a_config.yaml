# ============================================================================
# MODEL A TRAINING CONFIGURATION (ARAÇ BİLGİSİ - ARAC_BİLGİSİ)
# ============================================================================
#
# KULLANIM:
#   python train.py --config configs/model_a_config.yaml
#
# ============================================================================

meta:
  model_id: "model_a"
  description: "Model A (arac_bilgisi)"

# --- VERI SETI AYARLARI ---
dataset:
  # Roboflow project ID'si veya yerel veri seti yolu
  path: "/data/arac_bilgisi"  # Docker: /data volume'ünden

  # Veri split oranları (yeni split oluşturulurken kullanılır)
  train_split: 0.70
  val_split: 0.20
  test_split: 0.10

  # Sınıflar (7 araç tipi + 1 plaka ROI)
  classes:
    - "hatchback"
    - "pickup"
    - "sedan"
    - "suv"
    - "minibus"
    - "panelvan"
    - "kamyon"
    - "plaka"

  # Augmentation (veri artırma) ayarları
  augmentation:
    hsv_augment:
      h_gain: 0.015
      s_gain: 0.7
      v_gain: 0.4

    geometric:
      degrees: 10
      translate: 0.1
      scale: [0.5, 1.5]
      perspective: 0.0
      flipud: 0.5
      fliplr: 0.5

    mosaic:
      enabled: true
      prob: 1.0

    mixup:
      enabled: true
      prob: 0.3
      alpha: 8.0

# --- MODEL MİMARİSİ ---
model:
  architecture: "yolov8m"
  pretrained: true
  backbone: "coco"
  task: "detect"
  single_cls: false

# --- EĞİTİM AYARLARI ---
training:
  epochs: 100
  patience: 15
  batch_size: 32
  gradient_accumulation: 1
  imgsz: 640

  optimizer: "SGD"
  lr0: 0.01
  lrf: 0.01
  momentum: 0.937
  weight_decay: 0.0005

  scheduler: "linear"
  warmup_epochs: 3.0
  warmup_momentum: 0.8

  cls_pw: 1.0
  obj_pw: 1.0
  iou_pw: 2.0

# --- INFERENCE AYARLARI ---
inference:
  save_period: 5
  val_period: 1
  nms_conf_threshold: 0.25
  nms_iou_threshold: 0.45
  max_det: 10

# --- HARDWARE VE OPTIMIZASYON ---
hardware:
  device: "0"
  amp: true
  cache_images: false
  workers: 4
  pin_memory: true
  max_training_time_seconds: 18000

# --- ÇIKTI VE LOGGING ---
output:
  project: "/output/model_a"
  name: "experiment"
  save_best: true
  save_last: true
  log_freq: 50
  verbose: true

# --- DEBUGGİNG ---
debug:
  visualize_training: false
  save_predictions: false
  test_on_validation: true
  confidence_threshold: 0.5
