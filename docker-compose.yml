# =============================================================================
# docker-compose.yml — Cikarim (Inference) Pipeline
# -----------------------------------------------------------------------------
# NEDEN volume yollari /app/data/input ve /app/data/output ile BIREBIR eslesir?
#   FTR sartnamesi, girdi/cikti yollarini SABIT olarak tanimlar
#   (/app/data/input/video.mp4, /app/data/output/results.json). Bu volume
#   eslemeleri, host makinedeki GERCEK video dosyasini konteyner icindeki
#   BEKLENEN yola, kod DEGISTIRILMEDEN baglar.
# =============================================================================
services:
  cikarim:
    build:
      context: .
      dockerfile: Dockerfile
    image: teknofest/road_safety_inference:latest
    container_name: road_safety_inference

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    volumes:
      # Host'taki test videosu, konteyner icinde FTR'nin BEKLEDIGI sabit
      # yola SALT-OKUNUR (read-only) olarak baglanir.
      - ./data/input/video.mp4:/app/data/input/video.mp4:ro
      # Cikti JSON'u host'a yazilir ki konteyner kapandiktan sonra da erisilebilsin.
      - ./data/output:/app/data/output
      # Egitilmis agirliklar (Model A + Model B), imaj YENIDEN BUILD
      # EDILMEDEN guncellenebilsin diye volume olarak da baglanabilir
      # (isteniyorsa COPY yerine bu satir aktif edilebilir).
      - ./models:/app/models:ro
