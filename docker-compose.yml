# Model A egitim denemeleri icin docker-compose
#
# Kullanim:
#   docker compose up baseline --build
#   docker compose up exp_high_lr --build
#   docker compose logs -f baseline

services:
  baseline:
    build:
      context: .
      dockerfile: Dockerfile.train
    image: rumicim/road_safety:v1.0
    container_name: model_a_baseline
    environment:
      - NVIDIA_VISIBLE_DEVICES=0
      - CUDA_VISIBLE_DEVICES=0
    volumes:
      - ./data/arac_bilgisi:/data/arac_bilgisi:ro
      - ./output/experiment_baseline:/output
      - ./logs/experiment_baseline:/app/logs
    deploy:
      resources:
        limits:
          memory: 14G
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    working_dir: /app
    command:
      - python3
      - /app/train.py
      - --config
      - /app/configs/model_a_config.yaml
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"
    restart: "no"

  exp_aggressive_aug:
